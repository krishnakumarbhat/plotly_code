; INI file to use with F360 Tracker (Both Resim and Tracker PC)
; In the set of possible values for the calibrations or options, first value is the default one.
[TRACKERPC_UDP_TX]
Protocol=UDP
Port=5000
IPAddress=169.254.255.255
;
[TRACKERPC_BRR_RX]
Protocol=UDP
IPAddress=169.192.1.40
NetMask=255.255.255.0
Port=5555
;
[AutoAlignment]
; Alignment Commands (OFF, AUTO, SHORT TRACK, SERVICE)
AlignCommand=AUTO
;
[F360TimingOptions]
; Trigger tracker periodically(1) or when Front Right sensor detections are received(0) (Possible values = 1, 0)
TriggeronTime=1
;
; Time period used for trigger(in milliseconds, Integer greater than 0, default value = 50ms)
TriggerPeriod=50
;
[F360VRUClassifier]
; Run the VRU Classifier
EnableVRUClassifier=1
;
[RUNOAL]
; Run the Output Adaptation Layer
RunOAL=0
;
[F360TrackerVariant]
; Specify variant of tracker to running
TrackerVariant=A
;
; Run the ISO Output Adaptation Layer
RunISOOAL=0
;
[RUN_VSE_Buffering]
; Run the VSE Output buffering
RunVSE_buffering=1
;
[F360OutputLoggingOptions]
; Specify a trackerPc index used in the udp header to separate output from multiple trackers
TrackerID=0
; 
; Enable logging of detections and objects with variable stream size
EnableVariableLogging=1
;
;Transmit CSLP Info (CAN info, Sensor info, options) UDP Stream? (Possible values = 1,0)
LogCSLPInfo=1
;
;Transmit Process Detections Output UDP Stream? (Possible values = 1,0)
LogProcDets=1
;
; Transmit Static environment polymonial Output UDP Stream? (Possible values = 1,0)
LogStaticEnvPolys=1;
;
; Transmit Trailer Detector Output UDP Stream? (Possible values = 1,0)
LogTrailerDetector=1;
;
;Transmit All Objects Output UDP Stream? (Possible values = 1,0)
LogAllObjects=1
;
;Transmit Timing Info Output UDP Stream? (Possible values = 1,0)
LogTimingInfo=1
;
;Transmit Alignment Info Output UDP Stream? (Possible values = 1,0)
LogAlignInfo=1
;
;Transmit Functional Safety Faults Output UDP Stream? (Possible values = 1,0)
LogFunctionalSafetyFaults=1
;
;Transmit Partial Blockage Info Output UDP Stream? (Possible values = 1,0)
LogPartialBlockageInfo=1
;
;Transmit Tracker Info Output UDP Stream? (Possible values = 1,0)
LogTrackerInfo=1
;
;Transmit Vehicle Info Output UDP Stream? (Possible values = 1,0)
LogVehicleInfo=1
;
;Transmit Tracker Internal Output UDP Stream? (Possible values = 1,0)
LogTrackerInternal=1
;
;Transmit Unified Output UDP Stream? (Possible values = 1,0)
LogUnifiedOutput=0
;
;Transmit VRU Output UDP Stream? (Possible values = 1,0)
LogVRUData=1
;
;Transmit Output OAL Output UDP Stream? (Possible values = 1,0)
LogOALData=0
;
;Transmit VSE Internals UDP Stream? (Possible values = 1,0)
LogVSEInternal=1
;
;All calibrations below are relative to VCS coordinate frame
[F360VehicleCalib]
; Veh Data Sources (Possible values = XCAN,VVCAN,BVCAN,CWMPVIS,ESR2BOX,RsdsPCAN,TRKECHO,NONE,
;    EXTERN,FH2SVCAN,BMWVCAN,VOLVOSCE,MRRCAN,EURO_FF,PCHCAN,HYUNDAI_EU,PSA,PACCAN,JLR,RNA_SUV,
;    HKMC, RNA, GAC, SGM, VOLVO_V40, NIO, FEDEX, APTIV, STLA_PWL23 )
VehDataSource=FH2SVCAN
;
; Can bus to read the VehDataSource
VehicleCanBus=1
;
; VehDataSource can bus speed
VehicleCanBusSpeed=500
;
;Specify if vehicle signals should be gatewayed to sensors (Possible values 0,1)
GatewayVehicleSignals=1
;
;Distance from VCS origin to Center of rear axle, in meters
DistRearAxle_m=4.012
;
;The rear cornering compliance, [rad*m/s*s]
RearCornerCompliance_m=0.0053
;
;The ratio between the turn of the steering wheel and the turn of the wheels
SteerGearRatio=15.0
;
;The distance between the centers of the front and rear wheels
Wheelbase_m=2.4
;
;Distance between the two front wheels
FrontTrackWidth_m=1.7
;
;Width of the vehicle body (excluding the rear view mirrors)
VehicleWidth_m=2.0
;
;Length of the vehicle body
VehicleLength_m=4.0
;
;Radius of the front wheel
FrontWheelRadius_m=1.0
;
;Understeer coefficient
UndersteerCoefficient=0.0053
;
;Center of gravity
CogX=0.0
;
;Center of gravity
CogY=0.0
;
;The SpeedCorrectionFactor is defined as speed = raw_speed * SpeedCorrectionFactor. (Only used if AlignCommand=OFF) 
SpeedCorrectionFactor=0.97
;
;Raw host signal latency [ms]
HostSignalLatency_ms=50
;
;Flag to enable the internal reflections function
; Possible values: 0=disabled
;                  1=general tuning enabled for all sensors
;                  2=trailer tuning enabled for rear sensors when trailer is present
EnableInternalReflectionsFunction=0
;
;-------------------------------------------------------------------------
;   -----  Below is the definitions of the sensor calibration values -----
; --- Section naming convention ---
; Format := MntLoc_SensorCalib. 
; Possible values -> MntLoc := RightFwd, LeftFwd, RightRear, LeftRear, RightSide1, LeftSide1, CenterFwd, CenterRear
;Parametes with a * in front of them are needed
; --- Sensor Properties ---
;Use_Sensor        -> Specify if the sensor is to be used (Default = 0; Possible values 0,1)
;Sensor_Type       -> Type of sensor (Default = SRR4_RADAR;
;                  -> Possible values = ESR_RADAR, MRR1_RADAR, MRR2_RADAR, MRR3_RADAR, SRR4_RADAR, SRR5_RADAR, MRR360_RADAR, SRR5+_RADAR, SRRAD_RADAR, FLR4_RADAR, FLR4+_RADAR, SRR6_RADAR, SRR6+_RADAR)
;Multi_Mode        -> Is the sensor in Multi Mode?(Default = 0; Possible values = 0, 1; Only if Sensor_Type == SRR4)
;Receive_Protocol  -> How to recieve the sensor data (Default = CAN; Possible values = CAN, BRR)
;(*)CanBus_Channel -> Which channel should the sensor data be read from (Only needed if Receive_Protocol == CAN)
;CanBus_Speed   -> Which speed does the can bus have (Default = 500)
;Parse_CDC_Data -> Parse the CDC data.(Default = 0; Possible values = 0,1; Only if Receive_Protocol = BRR)
; --- Mounting Properties ---
;Align_FromCAN  -> Read alignment data from CAN. (Default = 0)
;MntPos_FromCAN -> Read the mounting position from CAN. (Default = 0)
;                  If Read_SensorMntPos = 1 then no mounting positions are needed
;*LatMntPos_m   -> Lateral Mounting position of the sensor from VCS in meters      (+ right)
;*LngMntPos_m   -> Longitudinal Mounting position of the sensor from VCS in meters (+ forward)
;VertMntPos_m   -> Height Mounting position of the sensor from VCS in meters       (+ down)
;*BoreMntAzimuthAng_deg -> Boresight azimuth Mounting position of the sensor from VCS in degrees   (+ right)
;BoreMntElevAng_deg     -> Boresight elevation Mounting position of the sensor from VCS in degrees (+ down)
;*AzPolarity            -> Polarity of the sensor (1 or -1).
; --- Detection Properties ---
; If the properties below are written, then they will be used.
; If not then they will be read from CAN if possible otherwise they will get default values based on the sensor type.
;FOV_MIN_AZ_DEG_LOOK_N -> Lower  end of cut-off for Azimuth   Field of View for look type N, N = {0,1,2,3} (Default based on sensor type)
;FOV_MAX_AZ_DEG_LOOK_N -> Higher end of cut-off for Azimuth   Field of View for look type N, N = {0,1,2,3} (Default based on sensor type)
;FOV_MIN_EL_DEG_LOOK_N -> Lower  end of cut-off for Elevation Field of View for look type N, N = {0,1,2,3} (Default based on sensor type)
;FOV_MAX_EL_DEG_LOOK_N -> Higher end of cut-off for Elevation Field of View for look type N, N = {0,1,2,3} (Default based on sensor type)
;RNG_RATE_INTERVAL_WIDTH_LOOK_N -> Doppler coverage for look type N, N = {0,1,2,3}            (Default based on sensor type)
;RANGE_LIMIT_LOOK_N -> Range limit for look type N, N = {0,1,2,3}                             (Default based on sensor type)
;-------------------------------------------------------------------------
[RightFwd_SensorCalib]
; Sensor Properties
Use_Sensor=1
Sensor_Type=SRR4_RADAR
Multi_Mode=0
Receive_Protocol=CAN
CanBus_Channel=1
CanBus_Speed=500
Parse_CDC_Data=0
Align_FromCAN=0
MntPos_FromCAN=0
; Mounting Properties
LatMntPos_m=0.877
LngMntPos_m=-0.351
VertMntPos_m=0.5
BoreMntAzimuthAng_deg=67
BoreMntElevAng_deg=0.0
AzPolarity=-1
; Detection Properties
;FOV_MIN_AZ_DEG_LOOK_0=-75
;FOV_MAX_AZ_DEG_LOOK_0=75
;FOV_MIN_AZ_DEG_LOOK_1=-75
;FOV_MAX_AZ_DEG_LOOK_1=75
;FOV_MIN_AZ_DEG_LOOK_2=-75
;FOV_MAX_AZ_DEG_LOOK_2=75
;FOV_MIN_AZ_DEG_LOOK_3=-75
;FOV_MAX_AZ_DEG_LOOK_3=75
;FOV_MIN_EL_DEG_LOOK_0=-25
;FOV_MAX_EL_DEG_LOOK_0=25
;FOV_MIN_EL_DEG_LOOK_1=-25
;FOV_MAX_EL_DEG_LOOK_1=25
;FOV_MIN_EL_DEG_LOOK_2=-25
;FOV_MAX_EL_DEG_LOOK_2=25
;FOV_MIN_EL_DEG_LOOK_3=-25
;FOV_MAX_EL_DEG_LOOK_3=25
;RNG_RATE_INTERVAL_WIDTH_LOOK_0=69.8359375
