<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HPCC Runtime Console</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0d4f3c 0%, #1a8b6f 100%);
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
        }
        .login-card {
            background: #fff;
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        .login-card h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #0d4f3c;
            margin-bottom: 0.25rem;
        }
        .login-card p {
            color: #6b7a73;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }
        .login-card .form-label { font-weight: 600; font-size: 0.85rem; }
        .login-card .btn-primary {
            background: #0d4f3c;
            border: none;
            border-radius: 999px;
            padding: 0.6rem 2rem;
            font-weight: 600;
        }
        .login-card .btn-primary:hover { background: #1a8b6f; }
        .brand-mark {
            display: inline-block;
            background: #e7f3ef;
            padding: 0.2rem 0.6rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 700;
            color: #0d4f3c;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand-mark">HP</div>
        <h1>HPCC Runtime Console</h1>
        <p>Demo — Resim Run feature</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'danger' if category == 'error' else category }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Net ID</label>
                <input type="text" class="form-control" name="net_id" value="pcmzxl" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" name="password" value="demo123" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Sign in</button>
        </form>

        <hr class="my-4">
        <p class="text-muted small text-center mb-0">
            Demo credentials: <strong>pcmzxl</strong> / <strong>demo123</strong>
        </p>
    </div>
</body>
</html>
